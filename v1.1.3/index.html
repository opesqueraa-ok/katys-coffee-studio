<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Katy's Coffee Studio v1.1.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <header>
            <h3>Katy's Coffee Studio ☕ | Caja: <span id="dinero-total">Q0.00</span></h3>
        </header>

        <div id="barista-bench">
            <div class="station" id="st-1">
                <span class="step-label">1. Pesaje (Meta: 18.0g)</span>
                <div class="lcd-display" id="peso-display">0.0g</div>
                <button id="btn-verter" class="main-btn">VERTER</button>
                <button onclick="avanzarDePesaje()" id="btn-continuar-1" class="main-btn success hidden">Continuar →</button>
            </div>

            <div class="station locked" id="st-2">
                <span class="step-label">2. Limpia y Muele</span>
                <div class="circle-ui" id="area-molienda">
                    <div id="suciedad"></div>
                    <div id="cafe-molido"></div>
                </div>
                <button id="btn-moler" class="main-btn hidden">MOLER</button>
            </div>

            <div class="station locked" id="st-3">
                <span class="step-label" id="label-tamp">3. WDT (Limpia grumos)</span>
                <div class="progress-bar-container"><div id="wdt-progress"></div></div>
                <div class="circle-ui" id="area-tamp">
                    <div id="cafe-puck"></div>
                    <div id="grumos"></div>
                </div>
                <div id="tamp-ui" class="hidden">
                    <div class="pressure-gauge"><div id="gauge-zone"></div><div id="needle"></div></div>
                    <button id="btn-tamp" class="main-btn">TAMP</button>
                </div>
            </div>

            <div class="station locked" id="st-4">
                <span class="step-label">4. Extracción</span>
                <div class="cup-container">
                    <div id="stream"></div>
                    <div id="target-line"></div>
                    <div id="liquid"></div>
                </div>
                <button id="btn-extraer" class="main-btn">START</button>
                <button onclick="avanzarDeExtraccion()" id="btn-continuar-4" class="main-btn success hidden">Servir →</button>
            </div>

            <div class="station locked" id="st-5">
                <span class="step-label">5. Elige tu Arte Latte</span>
                <div class="art-options">
                    <button class="art-btn" onclick="seleccionarArte('corazon')">🤍 Corazón</button>
                    <button class="art-btn" onclick="seleccionarArte('rayas')">🌿 Rayas (Helecho)</button>
                    <button class="art-btn" onclick="seleccionarArte('espiral')">🌀 Espiral</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pantalla-resultados" class="hidden">
        <div class="ticket">
            <h2>¡Pedido Servido!</h2>
            
            <div class="cup-top-view">
                <div id="latte-art-container"></div>
            </div>

            <div class="feedback-text">
                <h3 id="calificacion-titulo">Excelente</h3>
                <p id="feedback-detalle">El balance perfecto.</p>
            </div>
            
            <div class="receipt">
                <p>Café Base: <span>Q25.00</span></p>
                <p>Propina por calidad: <span id="propina-monto">Q0.00</span></p>
                <hr>
                <h3>Total Ganado: <span id="total-ganado" class="dinero-verde">Q0.00</span></h3>
            </div>
            
            <button onclick="siguienteCliente()" class="main-btn success btn-large">Atender al siguiente ☕</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
