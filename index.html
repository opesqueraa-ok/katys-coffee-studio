<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katy's Coffee Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Katy's Coffee Studio ☕</h1>
            <div id="stats">
                Puntos de Maestría: <span id="maestria">0</span>
            </div>
        </header>

        <main id="station">
            <h2 id="instruccion">¡Bienvenida, Barista! Toca el frasco de granos para empezar.</h2>
            <div id="interaction-area">
                <button id="main-action">🫙 Granos de Café</button>
            </div>
        </main>

        <footer id="inventory">
            <h3>Herramientas Desbloqueadas:</h3>
            <ul id="tools-list">
                <li>✅ Molino Básico</li>
            </ul>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
