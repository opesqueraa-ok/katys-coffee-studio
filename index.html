<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Katy's Coffee Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <header>
            <h3>Katy's Coffee Studio ☕ | Maestría: <span id="maestria">0</span></h3>
        </header>

        <div id="barista-bench">
            <div class="station" id="st-1">
                <span class="step-label">1. Pesaje (18.0g)</span>
                <div class="lcd-display" id="peso-display">0.0g</div>
                <button id="btn-verter" class="main-btn">VERTER</button>
                <button onclick="reiniciarPeso()" class="reset-btn">Reset</button>
            </div>

            <div class="station locked" id="st-2">
                <span class="step-label">2. Molienda</span>
                <div class="circle-ui" id="area-molienda">
                    <div id="suciedad"></div>
                    <div id="cafe-molido"></div>
                </div>
                <button id="btn-moler" class="main-btn hidden">MOLER</button>
            </div>

            <div class="station locked" id="st-3">
                <span class="step-label" id="label-tamp">3. WDT (Limpia grumos)</span>
                <div class="progress-bar-container"><div id="wdt-progress"></div></div>
                <div class="circle-ui" id="area-tamp">
                    <div id="cafe-puck"></div>
                    <div id="grumos"></div>
                </div>
                <div id="tamp-ui" class="hidden">
                    <div class="pressure-gauge"><div id="gauge-zone"></div><div id="needle"></div></div>
                    <button id="btn-tamp" class="main-btn">TAMP</button>
                </div>
            </div>

            <div class="station locked" id="st-4">
                <span class="step-label">4. Extracción (36.0g)</span>
                <div class="cup-container">
                    <div id="stream"></div>
                    <div id="liquid"></div>
                </div>
                <div class="lcd-display" id="ext-display">0.0g</div>
                <button id="btn-extraer" class="main-btn">START</button>
            </div>

            <div class="station locked" id="st-5">
                <span class="step-label">5. Arte Latte</span>
                <canvas id="canvas-art" width="140" height="140"></canvas>
                <button onclick="finalizar()" class="main-btn success">SERVIR</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
