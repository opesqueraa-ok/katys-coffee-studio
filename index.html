<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katy's Coffee Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Katy's Coffee Studio ☕</h1>
            <div id="stats">Maestría: <span id="maestria">0</span> pts</div>
        </header>

        <section id="estacion-pesado" class="station">
            <div class="display-container">
                <p class="instruccion">Paso 1: Pesa 18.0g de café en granos</p>
                <div class="bascula">
                    <span id="peso-actual">0.0</span><span class="unit">g</span>
                </div>
            </div>
            <div class="controls">
                <button id="btn-verter" class="btn-main">Dejar presionado para verter</button>
                <button onclick="reiniciarPeso()" id="btn-reiniciar-peso" class="hidden">Reiniciar</button>
                <button onclick="irA('estacion-molienda')" id="btn-ir-molienda" class="hidden btn-next">Siguiente: Moler →</button>
            </div>
        </section>

        <section id="estacion-molienda" class="station hidden">
            <div class="display-container">
                <p id="instruccion-molienda" class="instruccion">Paso 2: Limpia el portafiltro y muele</p>
                <div id="portafiltro-area-molienda" class="portafiltro-circle">
                    <div id="suciedad"></div>
                    <div id="cafe-molido" class="hidden"></div>
                </div>
            </div>
            <div class="controls">
                <button id="btn-moler" class="hidden btn-main">Mantener para moler</button>
                <button onclick="irA('estacion-pesado')" class="btn-back">← Volver</button>
                <button onclick="irA('estacion-tamp')" id="btn-ir-tamp" class="hidden btn-next">Siguiente: Nivelar →</button>
            </div>
        </section>

        <section id="estacion-tamp" class="station hidden">
            <div class="display-container">
                <p id="instruccion-tamp" class="instruccion">Paso 3: Rompe los grumos (WDT) moviendo el dedo</p>
                <div id="area-tamp" class="portafiltro-circle">
                    <div id="cafe-puck"></div>
                    <div id="grumos"></div> </div>
                <div id="medidor-presion" class="hidden">
                    <div id="zona-perfecta"></div>
                    <div id="aguja-presion"></div>
                </div>
            </div>
            <div class="controls">
                <button id="btn-tamp" class="hidden btn-main">Presionar Tamper</button>
                <button onclick="irA('estacion-molienda')" class="btn-back">← Volver</button>
                <button onclick="alert('¡Café listo para la máquina! (Próxima actualización: La Extracción)')" id="btn-finalizar" class="hidden btn-next">¡Perfecto! 🎉</button>
            </div>
        </section>

        <footer>
            <p id="pista">El WDT asegura que el agua pase uniformemente por el café.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
