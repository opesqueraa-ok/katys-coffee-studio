<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Katy's Coffee Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <header>
            <h1>Katy's Coffee Studio ☕ <small>Maestría: <span id="maestria">0</span></small></h1>
        </header>

        <div id="barista-bench">
            
            <div class="tool-station" id="station-scale">
                <p>1. Pesaje (18g)</p>
                <div class="bascula"><span id="peso-actual">0.0</span>g</div>
                <button id="btn-verter" class="ctrl-btn">VERTER</button>
                <button onclick="reiniciarPeso()" class="mini-btn">Reiniciar</button>
            </div>

            <div class="tool-station locked" id="station-grinder">
                <p>2. Molienda</p>
                <div class="portafiltro-circle" id="area-molienda">
                    <div id="suciedad"></div>
                    <div id="cafe-molido"></div>
                </div>
                <button id="btn-moler" class="ctrl-btn hidden">MOLER</button>
            </div>

            <div class="tool-station locked" id="station-tamp">
                <p>3. WDT & Tamp</p>
                <div class="portafiltro-circle" id="area-tamp">
                    <div id="cafe-puck"></div>
                    <div id="grumos"></div>
                </div>
                <div id="medidor-presion" class="hidden">
                    <div id="zona-perfecta"></div>
                    <div id="aguja-presion"></div>
                </div>
                <button id="btn-tamp" class="ctrl-btn hidden">TAMP</button>
            </div>

            <div class="tool-station locked" id="station-machine">
                <p>4. Extracción (36g)</p>
                <div id="taza-area">
                    <div id="chorro-cafe"></div>
                    <div id="liquido-taza"></div>
                </div>
                <div class="bascula"><span id="peso-extraccion">0.0</span>g</div>
                <button id="btn-extraer" class="ctrl-btn">START</button>
            </div>

            <div class="tool-station locked" id="station-art">
                <p>5. Arte Latte</p>
                <canvas id="canvas-diseno" width="200" height="200"></canvas>
                <button onclick="finalizarTodo()" class="ctrl-btn">SERVIR</button>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
