<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katy's Coffee Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Katy's Coffee Studio ☕</h1>
            <div id="stats">Maestría: <span id="maestria">0</span> pts</div>
        </header>

        <main id="station">
            <div id="display-container">
                <p id="instruccion">Paso 1: Pesa 18.0g de café</p>
                <div id="bascula">
                    <span id="peso-actual">0.0</span><span class="unit">g</span>
                </div>
            </div>

            <div id="interaction-area">
                <div id="frasco-container">
                    <div id="grano-visual"></div>
                    <button id="btn-verter">Dejar presionado para verter</button>
                </div>
                <button id="btn-reiniciar" class="hidden">Reiniciar Pesaje</button>
                <button id="btn-siguiente" class="hidden">¡Peso Perfecto! Siguiente Paso →</button>
            </div>
        </main>

        <footer>
            <p>Sugerencia: Suelta cerca de los 17.8g para no pasarte.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
